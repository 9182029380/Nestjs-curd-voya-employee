# ============================================================
# NestJS Employee CRUD - Kubernetes Deployment
# IMAGE_TAG is replaced by Jenkins with the build number
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nestjs-employee-app
  namespace: default
  labels:
    app: nestjs-employee-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nestjs-employee-app
  template:
    metadata:
      labels:
        app: nestjs-employee-app
    spec:
      containers:
        - name: nestjs-employee-app
          # ===== CHANGE: replace 'your_dockerhub_username' =====
          image: your_dockerhub_username/nestjs-employee-crud:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # Database connection - points to mysql-service inside cluster
            - name: DB_HOST
              value: "mysql-service"
            - name: DB_PORT
              value: "3306"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          # Health check - K8s restarts pod if app is unhealthy
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
