# ============================================================
# MySQL credentials stored as Kubernetes Secret
# Values must be base64 encoded:
#   echo -n "your_value" | base64
#
# Example:
#   echo -n "root"       | base64  →  cm9vdA==
#   echo -n "password"   | base64  →  cGFzc3dvcmQ=
#   echo -n "employeedb" | base64  →  ZW1wbG95ZWVkYg==
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: default
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: cGFzc3dvcmQ=     # password
  MYSQL_DATABASE: ZW1wbG95ZWVkYg==       # employeedb
  MYSQL_USER: cm9vdA==                   # root
  MYSQL_PASSWORD: cGFzc3dvcmQ=          # password
