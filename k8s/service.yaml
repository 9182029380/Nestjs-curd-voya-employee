# ============================================================
# NestJS Employee App - Kubernetes Service
# NodePort exposes the app on port 30080 of every node
# Access via: http://<node-ip>:30080
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: nestjs-employee-service
  namespace: default
spec:
  selector:
    app: nestjs-employee-app
  type: NodePort
  ports:
    - protocol: TCP
      port: 80           # Service port (internal cluster)
      targetPort: 3000   # Container port (NestJS)
      nodePort: 30080    # External port on the Node (30000-32767)
